<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #000000, #001f3f, #003366);
    color: #ffffff;
    text-align: center;
}

/* Center container */
.container {
    margin-top: 80px;
    background: rgba(0,0,0,0.6);
    padding: 30px;
    border-radius: 20px;
    width: 90%;
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
    box-shadow: 0 0 25px rgba(0,0,0,0.8);
}

/* Heading */
h1 {
    font-size: 45px;
    color: #FFD700;
    text-shadow: 0 0 15px #FFD700;
}

/* Sub heading */
h2 {
    font-size: 18px;
    color: #00ffcc;
}

/* Paragraph */
p {
    font-size: 18px;
    line-height: 1.6;
}

/* Moon animation */
.moon {
    font-size: 50px;
    position: absolute;
    top: 20px;
    left: -100px;
    animation: moveMoon 10s linear infinite;
}

@keyframes moveMoon {
    from { left: -100px; }
    to { left: 110%; }
}

/* Countdown */
#countdown {
    font-size: 22px;
    margin: 15px 0;
    color: #00ffcc;
}

/* Button */
button {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: #FFD700;
    font-weight: bold;
    cursor: pointer;
}

/* Footer */
.footer {
    margin-top: 20px;
    font-size: 14px;
    opacity: 0.9;
}
</style>
</head>

<body>

<div class="moon">🌙</div>

<div class="container">

    <h1>✨ Eid Mubarak 🌙</h1>
    <h2>From Muhammad Umar Lone 💖</h2>

    <div id="countdown"></div>

    <p>
        May this Eid bring peace, happiness, and endless blessings to your life.
    </p>

    <p>
        Celebrate with love, kindness, and beautiful moments with your family.
    </p>

    <button onclick="share()">Share 🎉</button>

    <div class="footer">
        © 2026 Muhammad Umar Lone
    </div>

</div>

<script>
// Countdown
let eidDate = new Date("April 10, 2026 00:00:00").getTime();

setInterval(function() {
    let now = new Date().getTime();
    let distance = eidDate - now;

    let days = Math.floor(distance / (1000*60*60*24));
    let hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
    let minutes = Math.floor((distance % (1000*60*60)) / (1000*60));

    document.getElementById("countdown").innerHTML =
        "⏳ " + days + "d " + hours + "h " + minutes + "m left";
}, 1000);

    if (navigator.share) {

            url: window.location.href
        });
